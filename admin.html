<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://img.youtube.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://noembed.com; frame-src 'none';">
    <title>Control Terminal - UIT Knowledge</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body class="admin-body">
    <!-- Auth Screen -->
    <div id="auth-container" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span
                    style="font-family: 'Fira Code'; color: var(--primary); font-size: 12px; font-weight: 500;">ACCESS_REQUISITION</span>
                <h2>Admin Control</h2>
                <p style="color: var(--text-dim); font-size: 14px;">Xác thực quyền quản trị hệ thống</p>
            </div>
            <form id="login-form" class="auth-form" style="margin-top: 2.5rem;">
                <div class="form-group">
                    <label>Terminal Email</label>
                    <input type="email" id="email" required placeholder="admin@uit.edu.vn">
                </div>
                <div class="form-group">
                    <label>Security Key</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Authorize</button>
                <div id="login-error" style="color: #ff4b4b; font-size: 12px; margin-top: 1rem; text-align: center;">
                </div>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="admin-container" class="admin-layout" style="display: none;">
        <aside class="admin-sidebar">
            <div style="padding: 0 1rem 2.5rem;">
                <div style="font-size: 1.25rem; font-weight: 800; letter-spacing: -0.05em; color: var(--primary);">UIT
                    KNOWLEDGE</div>
                <div style="font-family: 'Fira Code'; font-size: 10px; color: var(--text-muted);">ADMIN_TERMINAL_V1.0
                </div>
            </div>
            <nav class="admin-nav">
                <button class="nav-item active" data-tab="videos">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z">
                        </path>
                        <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon>
                    </svg>
                    <span>Videos</span>
                </button>
                <button class="nav-item" data-tab="courses">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                    </svg>
                    <span>Khóa học</span>
                </button>
                <button class="nav-item" data-tab="merch">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span>Merch Store</span>
                </button>
            </nav>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border);">
                <button id="logout-btn" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Kết thúc phiên</span>
                </button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="content-header">
                <div>
                    <span
                        style="font-family: 'Fira Code'; color: var(--primary); font-size: 11px; font-weight: 500;">MANAGER_CORE</span>
                    <h1 id="tab-title">Videos</h1>
                </div>
                <button id="add-btn" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Thêm mục mới
                </button>
            </header>

            <div id="content-area" class="item-grid" style="display: grid; gap: 0.75rem;">
                <!-- Content Injected Here -->
            </div>
        </main>
    </div>

    <!-- Modal System -->
    <div id="modal" class="modal-overlay">
        <div class="modal-shell">
            <div class="modal-header">
                <div>
                    <span id="modal-subtitle"
                        style="font-family: 'Fira Code'; color: var(--primary); font-size: 10px; font-weight: 500;">PATCHING_DATA</span>
                    <h2 id="modal-title">Cập nhật nội dung</h2>
                </div>
                <button class="btn-ghost close-modal"
                    style="padding: 0.5rem; font-size: 1.5rem; line-height: 1;">&times;</button>
            </div>
            <form id="item-form" class="modal-body">
                <div id="dynamic-fields">
                    <!-- Dynamic form fields -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-ghost close-modal">Hủy bỏ</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">Lưu phiên bản</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="admin.js"></script>
</body>

</html>
